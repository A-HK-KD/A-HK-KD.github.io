<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRF Merging</title>
  <link rel="icon" type="image/x-icon" href="../images/A-HK-icon-black.svg">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg-primary: #ffffff;
    --color-bg-secondary: #f7f7f5;
    --color-bg-tertiary: #f1efe8;
    --color-bg-info: #e6f1fb;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.22);
    --color-border-primary: rgba(0,0,0,0.32);
    --color-border-info: #378add;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg-primary: #1e1e1c;
      --color-bg-secondary: #2a2a28;
      --color-bg-tertiary: rgb(17, 19, 25);
      --color-bg-info: #042c53;
      --color-text-primary: #f0ede6;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.18);
      --color-border-primary: rgba(255,255,255,0.28);
      --color-border-info: #85b7eb;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 1.5rem;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 1.25rem;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 5px;
  }

  .header p {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.6;
    max-width: 640px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 12px;
    color: var(--color-text-secondary);
    white-space: nowrap;
  }

  .controls input[type="range"] {
    width: 160px;
    accent-color: #378add;
    cursor: pointer;
  }

  .k-val {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-primary);
    min-width: 24px;
  }

  .k-hint {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-360    { background: #378ADD; }
  .dot-self   { background: #84069c; }
  .dot-mentor { background: #BA7517; }

  /* Two-column layout: sources left, merged right */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }

  /* Left: stacks all source cards vertically */
  .sources-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Right: sticky so it stays in view while scrolling sources */
  .merged-col {
    position: sticky;
    top: 1.5rem;
  }

  @media (max-width: 600px) {
    .layout { grid-template-columns: 1fr; }
    .merged-col { position: static; }
  }

  .col-card,
  .merged-card {
    background: var(--color-bg-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
  }

  .col-header,
  .merged-header {
    padding: 9px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .merged-header {
    background-color: #1ec28e;
  }

  .col-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chunk-list { padding: 6px; }

  .chunk {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 6px;
    margin-bottom: 3px;
    cursor: grab;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-bg-secondary);
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    user-select: none;
  }

  .chunk:last-child { margin-bottom: 0; }
  .chunk:active { cursor: grabbing; }

  .chunk.dragging {
    opacity: 0.35;
    cursor: grabbing;
  }

  .chunk.drag-over {
    border-color: var(--color-border-info);
    background: var(--color-bg-info);
  }

  .drag-handle {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 2px;
    flex-shrink: 0;
    opacity: 0.45;
  }

  .drag-handle span {
    display: block;
    width: 9px;
    height: 1.5px;
    background: var(--color-text-tertiary);
    border-radius: 2px;
  }

  .rank-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-tertiary);
    min-width: 13px;
    text-align: center;
    flex-shrink: 0;
  }

  .chunk-label {
    flex: 1;
    font-size: 12px;
    color: var(--color-text-primary);
    line-height: 1.4;
    min-width: 0;
  }

  .score-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: 4px;
    white-space: nowrap;
    background: var(--color-bg-info);
    color: var(--color-text-info);
    flex-shrink: 0;
    font-family: var(--font-mono);
  }

  .merged-list { padding: 6px; }

  .merged-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    margin-bottom: 3px;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-bg-secondary);
    transition: border-color 0.25s;
  }

  .merged-item:last-child { margin-bottom: 0; }

  .merged-item.top { border-color: var(--color-border-info); }

  .merged-rank {
    font-size: 11px;
    font-weight: 500;
    width: 14px;
    text-align: center;
    color: var(--color-text-tertiary);
    flex-shrink: 0;
  }

  .merged-label {
    flex: 1;
    font-size: 12px;
    color: var(--color-text-primary);
    line-height: 1.4;
    min-width: 0;
  }

  .source-dots {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
  }

  .bar-wrap {
    width: 44px;
    height: 4px;
    background: var(--color-border-tertiary);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #378add;
    transition: width 0.3s ease;
  }

  .merged-score {
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-secondary);
    min-width: 44px;
    text-align: right;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }

  .formula-note {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--color-text-secondary);
    background: var(--color-bg-secondary);
    padding: 9px 12px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    line-height: 1.7;
  }

  .formula-note code {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--color-bg-tertiary);
    padding: 1px 5px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-tertiary);
  }

  .header {
    min-height: 32px;
    position: relative;
  }

  .interactive-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-info);
    background: var(--color-bg-info);
    padding: 6px 8px;
    border-radius: 10px;
    border: 0.5px solid var(--color-border-info);
    position: absolute;
    right: 0;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
   <!-- <h1>RRF merging</h1>
    <p>Drag chunks within each source column to rerank them. The merged leaderboard updates instantly — chunks appearing across multiple sources float to the top via cross-source consensus.</p>
  -->
    <span class="interactive-tag">Interactive Example - Play Around !</span>
  </div>


  <div class="controls">
    <label for="k-slider">k constant</label>
    <input type="range" min="1" max="120" value="60" id="k-slider" step="1">
    <span class="k-val" id="k-display">60</span>
    <span class="k-hint"> higher k softens rank differences</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot dot-360"></div> 360 feedback</div>
    <div class="legend-item"><div class="dot dot-self"></div> Self-assessment</div>
    <div class="legend-item"><div class="dot dot-mentor"></div> Mentor feedback</div>
  </div>

  <div class="layout">
    <div class="sources-col" id="sources-col"></div>
    <div class="merged-col" id="merged-col"></div>
  </div>

</div>

<script>
  const CHUNKS = [
    { id: 'A', label: 'Led backend migration to microservices, reducing latency 40%' },
    { id: 'B', label: 'Mentored 3 junior engineers through onboarding' },
    { id: 'C', label: 'Organised cross-team API design workshop' },
    { id: 'D', label: 'Resolved 12 critical production incidents' },
    { id: 'E', label: 'Contributed to org-wide coding standards doc' },
    { id: 'F', label: 'Led hiring panel for 2 senior engineer roles' },
  ];

  const SOURCES = [
    { key: '360',    label: '360 feedback',    dotClass: 'dot-360',    color: '#378ADD', order: [0,2,4,1,3,5] },
    { key: 'self',   label: 'Self-assessment', dotClass: 'dot-self',   color: '#84069c', order: [2,0,3,5,1,4] },
    { key: 'mentor', label: 'Mentor feedback', dotClass: 'dot-mentor', color: '#BA7517', order: [1,4,2,3,0,5] },
  ];

  let k = 60;
  let sourceOrders = SOURCES.map(s => [...s.order]);
  let dragging = null;
  let dragOverEl = null;

  function computeRRF() {
    const scores = {};
    const sources = {};
    sourceOrders.forEach((order, si) => {
      order.forEach((chunkIdx, rank) => {
        const id = CHUNKS[chunkIdx].id;
        scores[id] = (scores[id] || 0) + 1 / (k + rank + 1);
        if (!sources[id]) sources[id] = [];
        if (!sources[id].includes(si)) sources[id].push(si);
      });
    });
    return { scores, sources };
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len) + '…' : str;
  }

  function buildSourceCol(sIdx) {
    const s = SOURCES[sIdx];
    const order = sourceOrders[sIdx];

    const card = document.createElement('div');
    card.className = 'col-card';

    const hdr = document.createElement('div');
    hdr.className = 'col-header';
    hdr.innerHTML = `<span class="col-dot" style="background:${s.color}"></span>${s.label}`;
    card.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'chunk-list';
    list.dataset.si = sIdx;

    order.forEach((chunkIdx, rank) => {
      const chunk = CHUNKS[chunkIdx];
      const myScore = 1 / (k + rank + 1);

      const el = document.createElement('div');
      el.className = 'chunk';
      el.draggable = true;
      el.dataset.si = sIdx;
      el.dataset.rank = rank;
      el.dataset.chunkIdx = chunkIdx;

      el.innerHTML = `
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <div class="rank-badge">${rank + 1}</div>
        <div class="chunk-label">${truncate(chunk.label, 48)}</div>
        <div class="score-pill">${myScore.toFixed(4)}</div>
      `;

      el.addEventListener('dragstart', e => {
        dragging = { si: sIdx, rank };
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => el.classList.add('dragging'), 0);
      });

      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        if (dragOverEl) dragOverEl.classList.remove('drag-over');
        dragging = null;
        dragOverEl = null;
        render();
      });

      el.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragging && dragging.si === sIdx && dragging.rank !== rank) {
          if (dragOverEl && dragOverEl !== el) dragOverEl.classList.remove('drag-over');
          el.classList.add('drag-over');
          dragOverEl = el;
        }
      });

      el.addEventListener('dragleave', () => {
        el.classList.remove('drag-over');
      });

      el.addEventListener('drop', e => {
        e.preventDefault();
        if (dragging && dragging.si === sIdx) {
          const from = dragging.rank;
          const to = rank;
          const arr = sourceOrders[sIdx];
          const [moved] = arr.splice(from, 1);
          arr.splice(to, 0, moved);
        }
      });

      list.appendChild(el);
    });

    card.appendChild(list);
    return card;
  }

  function buildMerged() {
    const { scores, sources } = computeRRF();
    const sorted = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
    const maxScore = scores[sorted[0]];

    const card = document.createElement('div');
    card.className = 'merged-card';

    const hdr = document.createElement('div');
    hdr.className = 'merged-header';
    hdr.textContent = 'Merged leaderboard';
    card.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'merged-list';

    sorted.slice(0, 8).forEach((id, i) => {
      const chunk = CHUNKS.find(c => c.id === id);
      const score = scores[id];
      const srcs = sources[id];
      const pct = Math.round((score / maxScore) * 100);

      const el = document.createElement('div');
      el.className = 'merged-item' + (i === 0 ? ' top' : '');

      const dots = srcs.map(si =>
        `<div class="dot ${SOURCES[si].dotClass}" title="${SOURCES[si].label}"></div>`
      ).join('');

      el.innerHTML = `
        <div class="merged-rank">${i + 1}</div>
        <div class="merged-label">${truncate(chunk.label, 42)}</div>
        <div class="source-dots">${dots}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="merged-score">${score.toFixed(4)}</div>
      `;

      list.appendChild(el);
    });

    card.appendChild(list);
    return card;
  }

  function render() {
    const sourcesCol = document.getElementById('sources-col');
    const mergedCol = document.getElementById('merged-col');

    sourcesCol.innerHTML = '';
    mergedCol.innerHTML = '';

    for (let i = 0; i < SOURCES.length; i++) {
      sourcesCol.appendChild(buildSourceCol(i));
    }

    mergedCol.appendChild(buildMerged());
    const note = document.createElement('div');
    note.className = 'formula-note';
    note.innerHTML = `RRF score = <code>Σ 1 / (k + rank)</code> across all sources where the chunk appears &nbsp;·&nbsp; Additive scoring naturally boosts chunks with cross-source agreement &nbsp;·&nbsp; Top-15 merged results feed into the generation context`;
    mergedCol.appendChild(note);
  }

  document.getElementById('k-slider').addEventListener('input', function () {
    k = parseInt(this.value);
    document.getElementById('k-display').textContent = k;
    render();
  });

  render();
</script>
</body>
</html>
